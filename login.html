<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Back Office - Kc.coiffure</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(135deg, var(--color-black) 0%, var(--color-black-lighter) 100%);
        }
        .login-container {
            background: rgba(26, 26, 26, 0.95);
            padding: 50px;
            border-radius: var(--border-radius);
            border: 1px solid rgba(250, 218, 221, 0.2);
            backdrop-filter: blur(10px);
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: var(--shadow-pink);
        }
        .login-container h2 {
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--color-text-muted);
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            background: var(--color-black);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: var(--color-white);
            font-family: var(--font-body);
            transition: var(--transition);
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--color-pink);
            box-shadow: 0 0 0 2px rgba(250, 218, 221, 0.2);
        }
        .error-message {
            color: #f87171;
            margin-top: 15px;
            font-size: 0.9rem;
            display: none;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2 style="color: var(--color-pink);">Authentification</h2>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Identifiant</label>
                <input type="text" id="username" required>
            </div>
            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full" style="margin-top: 10px;">Se connecter</button>
            <div class="error-message" id="errorMessage">Identifiant ou mot de passe incorrect.</div>
        </form>
        <div style="margin-top: 20px;">
            <a href="index.html" style="color: var(--color-text-muted); font-size: 0.9rem; text-decoration: underline;">Retour au site</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const error = document.getElementById('errorMessage');

            // --- IDENTIFIANTS DU BACK OFFICE ---
            // À modifier selon votre choix
            const validUser = "admin";
            const validPass = "coiffure2026";

            if (user === validUser && pass === validPass) {
                // Stocker un jeton de session
                sessionStorage.setItem('kc_admin_logged_in', 'true');
                // Rediriger vers le back office
                window.location.href = 'admin.html';
            } else {
                error.style.display = 'block';
            }
        });
    </script>
</body>
</html>
